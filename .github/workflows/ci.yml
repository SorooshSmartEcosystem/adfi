name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Prisma's `validate` / `generate` need DATABASE_URL + DIRECT_URL to be
# *defined* in order to parse the schema's datasource block, even when
# we're not connecting to a real database. Set placeholder values at the
# job level so every step inherits them. The placeholders never connect
# to anything — schema parsing only checks env() resolution, not
# connectivity.
env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
  DIRECT_URL: postgresql://ci:ci@localhost:5432/ci?schema=public

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: install
        run: pnpm install --frozen-lockfile
      - name: prisma generate
        run: pnpm --filter @orb/db exec prisma generate
      - name: typecheck
        run: pnpm turbo run typecheck

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: install
        run: pnpm install --frozen-lockfile
      - name: prisma generate
        run: pnpm --filter @orb/db exec prisma generate
      - name: lint
        run: pnpm turbo run lint || true
