# Fly.io config for the Signal voice relay. Always-on (min_machines_running = 1)
# because Twilio doesn't tolerate connection latency on the WS upgrade — a
# cold-start spin up would drop the first ConversationRelay session.
# Sized small: each call is mostly idle waiting on STT, and the LLM call
# happens out-of-process at Anthropic.

app = "adfi-voice-relay"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "get"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
