<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORB · Full Prototype</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
    background: #1a1817;
    color: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px 0;
    gap: 20px;
  }

  .mono { font-family: "SF Mono", "JetBrains Mono", "Courier New", monospace; }

  /* Device frame */
  .device {
    width: 380px;
    height: 780px;
    background: #111;
    border-radius: 56px;
    padding: 10px;
    box-shadow: 0 0 0 2px #2a2a2a inset, 0 20px 60px rgba(0,0,0,0.4);
    position: relative;
    flex-shrink: 0;
  }
  .screen-area {
    width: 100%;
    height: 100%;
    background: #FAFAF7;
    border-radius: 46px;
    overflow: hidden;
    position: relative;
    transition: background 0.3s ease;
  }
  .screen-area.dark {
    background: linear-gradient(180deg, #2a2520 0%, #1a1715 50%, #0d0c0b 100%);
  }
  .notch {
    position: absolute; top: 10px; left: 50%;
    transform: translateX(-50%);
    width: 110px; height: 28px;
    background: #111; border-radius: 20px;
    z-index: 100;
  }
  .home-bar {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    width: 130px; height: 5px;
    background: #2a2a2a; border-radius: 3px;
  }
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 30px 0;
    font-size: 14px; font-weight: 500;
    font-family: "SF Mono", "JetBrains Mono", monospace;
    color: #111;
    position: relative; z-index: 10;
  }
  .status-bar.dark { color: white; }

  .content {
    height: calc(100% - 32px);
    position: relative;
    overflow: hidden;
  }

  /* Nav pills */
  .nav-wrap {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 380px;
    padding: 0 10px;
  }
  .nav-pill {
    background: transparent;
    border: 0.5px solid rgba(255,255,255,0.2);
    padding: 5px 11px;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    border-radius: 100px;
    font-family: "SF Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .nav-pill:hover { border-color: rgba(255,255,255,0.4); color: white; }
  .nav-pill.active { background: white; color: #111; border-color: white; }

  .section-label {
    color: rgba(255,255,255,0.4);
    font-family: "SF Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 6px;
    text-align: center;
  }

  /* ORB elements */
  .orb-lg { width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #333 0%, #111 60%); animation: float 4s ease-in-out infinite; }
  .orb-md { width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #333 0%, #111 60%); animation: float 3s ease-in-out infinite; }
  .orb-sm { width: 30px; height: 30px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #333 0%, #111 60%); cursor: pointer; transition: transform 0.15s; }
  .orb-sm:hover { transform: scale(1.1); }
  .orb-thinking { width: 115px; height: 115px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #333 0%, #111 60%); position: relative; animation: breathe 2s ease-in-out infinite; }
  .orb-thinking::after { content: ''; position: absolute; inset: -12px; border-radius: 50%; border: 0.5px solid #111; opacity: 0.2; animation: ripple 2s ease-out infinite; }

  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
  @keyframes ripple { 0% { transform: scale(1); opacity: 0.3; } 100% { transform: scale(1.4); opacity: 0; } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes wave { 0%, 100% { height: 8px; } 50% { height: 28px; } }
  @keyframes sheetup { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } 100% { content: ''; } }
  .dots::after { content: ''; animation: dots 1.5s steps(4) infinite; }

  /* Shared UI */
  .chip { font-size: 11px; color: #666; font-family: "SF Mono", monospace; background: white; border: 0.5px solid #E5E3DB; padding: 5px 10px; border-radius: 100px; display: inline-block; cursor: pointer; transition: all 0.15s; }
  .chip:hover { border-color: #999; }
  .chip.active { background: #111; color: white; border-color: #111; }

  .pbtn { background: #111; color: white; border: none; padding: 14px; border-radius: 14px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: "SF Mono", monospace; letter-spacing: 0.02em; transition: opacity 0.15s; width: 100%; }
  .pbtn:hover { opacity: 0.88; }
  .pbtn:active { opacity: 0.75; }
  .pbtn.secondary { background: white; color: #111; border: 0.5px solid #E5E3DB; }
  .pbtn:disabled { opacity: 0.4; cursor: not-allowed; }
  .pbtn.danger { background: #C84A3E; }

  textarea { width: 100%; padding: 14px; border: 0.5px solid #E5E3DB; border-radius: 14px; background: white; font-size: 13px; color: #111; line-height: 1.5; font-family: inherit; resize: none; outline: none; box-sizing: border-box; }
  textarea:focus { border-color: #111; }

  .agent-row { background: white; border: 0.5px solid #E5E3DB; border-radius: 14px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.15s; }
  .agent-row.hired { background: #111; border-color: #111; color: white; }
  .agent-row.hired .a-role { color: rgba(255,255,255,0.6); }
  .agent-row.hired .a-check { color: white; }
  .agent-row:active { transform: scale(0.99); }
  .a-dot { width: 9px; height: 9px; border-radius: 50%; background: #D5D2C5; flex-shrink: 0; }
  .agent-row.hired .a-dot { background: #7CE896; }

  .flow-row { background: white; border: 0.5px solid #E5E3DB; border-radius: 14px; padding: 12px 14px; cursor: pointer; transition: all 0.15s; }
  .flow-row:hover { border-color: #999; }
  .flow-row:active { background: #F2EFE5; }

  .metric-tile { background: white; border: 0.5px solid #E5E3DB; border-radius: 14px; padding: 14px; }

  /* Sheets */
  .sheet-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 40; animation: fade 0.2s ease-out; }
  .sheet { position: absolute; bottom: 0; left: 0; right: 0; background: #FAFAF7; border-radius: 28px 28px 0 0; padding: 14px 24px 24px; box-shadow: 0 -10px 40px rgba(0,0,0,0.08); max-height: 85%; overflow-y: auto; animation: sheetup 0.25s ease-out; z-index: 50; }
  .drag-h { width: 36px; height: 4px; background: #D5D2C5; border-radius: 2px; margin: 0 auto 16px; }

  .suggest-chip { background: white; border: 0.5px solid #E5E3DB; border-radius: 12px; padding: 11px 14px; font-size: 13px; color: #111; cursor: pointer; transition: all 0.15s; }
  .suggest-chip:hover { border-color: #111; }
  .suggest-chip:active { background: #F2EFE5; }

  .msg-bubble { max-width: 80%; padding: 10px 13px; border-radius: 16px; }
  .msg-bubble.them { background: #F2EFE5; align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg-bubble.us { background: #111; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

  .msg-row { background: white; border: 0.5px solid #E5E3DB; border-radius: 14px; padding: 12px 14px; cursor: pointer; transition: all 0.15s; }
  .msg-row:hover { border-color: #999; }
  .msg-row.amber { background: #FFF9ED; border-color: #F0D98C; }

  .appt-row { background: white; border: 0.5px solid #E5E3DB; border-radius: 14px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; gap: 12px; cursor: pointer; }
  .appt-row:hover { border-color: #999; }

  .setting-row { padding: 14px 16px; border-bottom: 0.5px solid #EEEBE0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.15s; }
  .setting-row:last-child { border-bottom: none; }
  .setting-row:hover { background: #F8F6EE; }
  .setting-row.nonclick { cursor: default; }
  .setting-row.nonclick:hover { background: transparent; }

  .toggle-sw { width: 42px; height: 24px; border-radius: 12px; background: #D5D2C5; position: relative; transition: background 0.2s; cursor: pointer; flex-shrink: 0; }
  .toggle-sw.on { background: #111; }
  .toggle-sw::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: white; transition: transform 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
  .toggle-sw.on::after { transform: translateX(18px); }

  .wave-bar { width: 3px; background: #111; border-radius: 2px; animation: wave 0.9s ease-in-out infinite; }

  .finding { padding: 12px 14px; border-bottom: 0.5px solid #EEEBE0; cursor: pointer; transition: all 0.15s; }
  .finding:last-child { border-bottom: none; }
  .finding:hover { background: #F8F6EE; }

  .bar { flex: 1; background: #E5E3DB; border-radius: 3px 3px 0 0; transition: height 0.4s ease; }
  .bar.active { background: #111; }

  .notif-btn { flex: 1; background: rgba(255,255,255,0.1); color: white; border: 0.5px solid rgba(255,255,255,0.12); padding: 9px 10px; border-radius: 10px; font-size: 11px; font-weight: 500; font-family: "SF Mono", monospace; cursor: pointer; transition: all 0.15s; }
  .notif-btn:hover { background: rgba(255,255,255,0.18); }
  .notif-btn.secondary { background: transparent; border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }

  /* Toast */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #111; color: white; padding: 10px 18px; border-radius: 100px; font-size: 12px; font-family: "SF Mono", monospace; z-index: 999; animation: fade 0.2s ease; }

  /* Info panel */
  .info-panel { position: fixed; top: 16px; right: 16px; width: 280px; background: rgba(30,28,26,0.95); backdrop-filter: blur(20px); border: 0.5px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 14px 16px; color: white; font-size: 12px; line-height: 1.5; z-index: 500; max-height: calc(100vh - 32px); overflow-y: auto; }
  .info-panel.hidden { display: none; }
  .info-panel h3 { font-size: 11px; letter-spacing: 0.15em; color: rgba(255,255,255,0.5); font-family: "SF Mono", monospace; margin-bottom: 8px; font-weight: 500; }
  .info-panel h2 { font-size: 14px; margin-bottom: 8px; font-weight: 500; }
  .info-panel p { color: rgba(255,255,255,0.75); margin-bottom: 8px; }
  .info-panel ul { list-style: none; padding: 0; }
  .info-panel li { color: rgba(255,255,255,0.75); padding: 4px 0; font-size: 11px; border-top: 0.5px solid rgba(255,255,255,0.08); }
  .info-panel li:first-child { border-top: none; }
  .info-panel li strong { color: white; font-weight: 500; }

  .info-toggle { position: fixed; top: 16px; right: 16px; background: rgba(30,28,26,0.95); color: white; border: 0.5px solid rgba(255,255,255,0.12); border-radius: 100px; padding: 8px 14px; font-size: 11px; font-family: "SF Mono", monospace; cursor: pointer; z-index: 501; backdrop-filter: blur(20px); }

  /* Hide scrollbars inside screen */
  .content *::-webkit-scrollbar { display: none; }
  .content * { scrollbar-width: none; }

  /* Nav toggle button (only visible on small screens) */
  .nav-toggle-mobile {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 600;
    background: #111;
    color: white;
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 100px;
    padding: 12px 18px;
    font-family: "SF Mono", monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: transform 0.15s;
  }
  .nav-toggle-mobile:active { transform: scale(0.95); }

  .mobile-nav-sheet {
    display: none;
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    max-height: 70vh;
    background: #1a1817;
    border-radius: 20px 20px 0 0;
    padding: 16px 20px 30px;
    z-index: 700;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.25s ease;
    box-shadow: 0 -20px 60px rgba(0,0,0,0.5);
  }
  .mobile-nav-sheet.open { transform: translateY(0); }

  .mobile-nav-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 699;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .mobile-nav-backdrop.open { opacity: 1; }

  .mobile-nav-handle {
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  /* Responsive breakpoints */
  @media (max-width: 820px) {
    body {
      justify-content: flex-start;
      padding: 0;
      gap: 0;
    }
    .device {
      width: 100vw;
      max-width: 380px;
      height: 100vh;
      max-height: 780px;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
    }
    .screen-area {
      border-radius: 0;
    }
    .notch { display: none; }
    .home-bar { display: none; }
    .section-label { display: none; }
    .nav-wrap { display: none !important; }
    .info-panel { display: none !important; }
    .info-toggle { display: none !important; }
    .nav-toggle-mobile { display: block; }
  }

  @media (max-width: 420px) {
    .device {
      width: 100vw;
      height: 100vh;
      max-width: none;
      max-height: none;
    }
  }
</style>
</head>

  `;
}

function billingSheet() {
  const p = state.selectedPlan || 'team';
  const prices = { starter: 39, team: 99, studio: 299 };
  const amt = prices[p];
  const bills = [
    { d: 'apr 1, 2026', a: amt, s: 'paid' },
    { d: 'mar 1, 2026', a: amt, s: 'paid' },
    { d: 'feb 1, 2026', a: amt, s: 'paid' },
    { d: 'jan 1, 2026', a: amt, s: 'paid' },
    { d: 'dec 5, 2025', a: 39, s: 'paid' }
  ];
  return `
    <div class="sheet-overlay" data-close-sheet></div>
    <div class="sheet">
      <div class="drag-h"></div>
      <p class="mono" style="font-size: 11px; color: #999; letter-spacing: 0.15em; margin: 0 0 14px;">BILLING HISTORY</p>
      <div style="background: white; border: 0.5px solid #E5E3DB; border-radius: 14px; overflow: hidden; margin-bottom: 14px;">
        ${bills.map((b, i) => `<div style="padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; ${i < bills.length - 1 ? 'border-bottom: 0.5px solid #EEEBE0;' : ''}"><div><p style="font-size: 13px; color: #111; margin: 0;">${p} plan</p><p class="mono" style="font-size: 11px; color: #999; margin: 1px 0 0;">${b.d}</p></div><div style="text-align: right;"><p class="mono" style="font-size: 13px; color: #111; margin: 0;">$${b.a}.00</p><p class="mono" style="font-size: 11px; color: #3a9d5c; margin: 1px 0 0;">${b.s}</p></div></div>`).join('')}
      </div>
      <button class="pbtn secondary" data-close-sheet>close</button>
    </div>
  `;
}

function dataSheet() {
  return `
    <div class="sheet-overlay" data-close-sheet></div>
    <div class="sheet">
      <div class="drag-h"></div>
      <p class="mono" style="font-size: 11px; color: #999; letter-spacing: 0.15em; margin: 0 0 14px;">DATA + PRIVACY</p>
      <div style="background: white; border: 0.5px solid #E5E3DB; border-radius: 14px; overflow: hidden; margin-bottom: 14px;">
        <div class="setting-row nonclick"><span style="font-size: 13px; color: #111;">record calls</span><div class="toggle-sw ${state.toggles.record ? 'on' : ''}" data-toggle="record"></div></div>
        <div class="setting-row nonclick" style="display: block;"><span style="font-size: 13px; color: #111;">retention</span><p class="mono" style="font-size: 11px; color: #999; margin: 2px 0 0;">auto-delete after 90 days</p></div>
        <div class="setting-row" data-toast="confirm delete all data?"><span style="font-size: 13px; color: #C84A3E;">delete all call data</span></div>
      </div>
      <p style="font-size: 11px; color: #999; line-height: 1.6; margin: 0 0 12px;">your data is encrypted at rest. only you and signal can access it. orb staff never see call content.</p>
      <button class="pbtn secondary" data-close-sheet>close</button>
    </div>
  `;
}

function signoutSheet() {
  return `
    <div class="sheet-overlay" data-close-sheet></div>
    <div class="sheet" style="text-align: center; padding-top: 30px;">
      <div class="drag-h"></div>
      <p style="font-size: 15px; color: #111; margin: 20px 0 8px; font-weight: 500;">sign out?</p>
      <p style="font-size: 12px; color: #888; margin: 0 0 20px;">signal will keep running. you can sign back in anytime.</p>
      <button class="pbtn danger" style="margin-bottom: 8px;" data-action="signout">sign out</button>
      <button class="pbtn secondary" data-close-sheet>cancel</button>
    </div>
  `;
}

// =============================================
// RENDER + BINDING
// =============================================
const routes = {
  splash: splashView, onboard: onboardView, hire: hireView, deck: deckView,
  needsyou: needsYouView, everything: everythingView,
  call: callView, missed: missedView, convo: convoView, booked: bookedView,
  inbox: inboxView, appts: apptsView, agent: agentView, report: reportView,
  settings: settingsView, lock: lockView, echo: echoView
};

const navPrimary = [
  { id: 'splash', label: 'splash' },
  { id: 'onboard', label: 'onboard' },
  { id: 'deck', label: 'home' },
  { id: 'needsyou', label: 'needs you' },
  { id: 'everything', label: 'show more' },
  { id: 'lock', label: 'lock screen' }
];
const navSecondary = [
  { id: 'call', label: 'live call' },
  { id: 'missed', label: 'missed' },
  { id: 'convo', label: 'convo' },
  { id: 'booked', label: 'booked' },
  { id: 'inbox', label: 'inbox' },
  { id: 'appts', label: 'appts' },
  { id: 'echo', label: 'echo' },
  { id: 'agent', label: 'specialists' },
  { id: 'report', label: 'report' },
  { id: 'settings', label: 'settings' }
];

function render() {
  const sa = document.getElementById('screen-area');
  const sb = document.getElementById('status-bar');
  const c = document.getElementById('content');

  if (state.tickerInterval) {
    clearInterval(state.tickerInterval);
    state.tickerInterval = null;
  }

  if (state.route === 'lock') {
    sa.classList.add('dark');
    sb.classList.add('dark');
  } else {
    sa.classList.remove('dark');
    sb.classList.remove('dark');
  }

  c.innerHTML = (routes[state.route] || deckView)();
  if (state.sheet) c.insertAdjacentHTML('beforeend', renderSheet());

  if (state.route === 'splash') {
    const events = [
      'booked a $850 lead 3 min ago',
      'echo posted to instagram · 1.2k reach',
      'signal recovered 7 missed calls this week',
      'scout spotted a competitor price drop',
      'ads draft ready · 3 variants waiting',
      'pulse flagged toronto design week'
    ];
    let idx = 0;
    state.tickerInterval = setInterval(() => {
      const el = document.getElementById('ticker-text');
      if (!el) { clearInterval(state.tickerInterval); return; }
      el.style.opacity = '0';
      setTimeout(() => {
        idx = (idx + 1) % events.length;
        el.textContent = events[idx];
        el.style.opacity = '1';
      }, 400);
    }, 3500);
  }

  renderNav();
  renderInfo();
  bind();
}

function renderNav() {
  const n1 = document.getElementById('nav-wrap');
  const n2 = document.getElementById('nav-wrap-2');
  n1.innerHTML = navPrimary.map(n => `<button class="nav-pill ${state.route === n.id ? 'active' : ''}" data-nav="${n.id}">${n.label}</button>`).join('');
  n2.innerHTML = navSecondary.map(n => `<button class="nav-pill ${state.route === n.id ? 'active' : ''}" data-nav="${n.id}">${n.label}</button>`).join('');

  // Also populate mobile nav sheet
  const mn = document.getElementById('mobile-nav-content');
  if (mn) {
    const allNav = [...navPrimary, ...navSecondary];
    mn.innerHTML = `
      <p style="color: rgba(255,255,255,0.4); font-family: 'SF Mono', monospace; font-size: 10px; letter-spacing: 0.2em; margin: 0 0 12px;">NAVIGATE TO</p>
      <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px;">
        ${allNav.map(n => `<button onclick="navigateAndClose('${n.id}')" style="background: ${state.route === n.id ? 'white' : 'rgba(255,255,255,0.08)'}; color: ${state.route === n.id ? '#111' : 'white'}; border: 0.5px solid ${state.route === n.id ? 'white' : 'rgba(255,255,255,0.1)'}; border-radius: 100px; padding: 8px 14px; font-family: 'SF Mono', monospace; font-size: 12px; cursor: pointer;">${n.label}</button>`).join('')}
      </div>
      <p style="color: rgba(255,255,255,0.4); font-family: 'SF Mono', monospace; font-size: 10px; letter-spacing: 0.2em; margin: 0 0 8px;">CURRENT SCREEN</p>
      <p style="color: white; font-size: 14px; font-weight: 500; margin: 0 0 4px;">${screenInfo[state.route]?.title || state.route}</p>
      <p style="color: rgba(255,255,255,0.6); font-size: 12px; line-height: 1.5; margin: 0 0 12px;">${screenInfo[state.route]?.desc || ''}</p>
    `;
  }
}

function toggleMobileNav() {
  const sheet = document.getElementById('mobile-nav-sheet');
  const bd = document.getElementById('mobile-nav-backdrop');
  const open = sheet.classList.toggle('open');
  bd.style.display = open ? 'block' : 'none';
  if (open) setTimeout(() => bd.classList.add('open'), 10);
  else bd.classList.remove('open');
}

function navigateAndClose(route) {
  state.route = route;
  state.sheet = null;
  toggleMobileNav();
  render();
}

function renderInfo() {
  const info = screenInfo[state.route];
  if (!info) return;
  const panel = document.getElementById('info-panel');
  panel.innerHTML = `
    <h3>${info.section}</h3>
    <h2>${info.title}</h2>
    <p>${info.desc}</p>
    <ul>${info.notes.map(n => `<li>${n}</li>`).join('')}</ul>
  `;
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function toggleInfo() {
  state.infoOpen = !state.infoOpen;
  document.getElementById('info-panel').classList.toggle('hidden', !state.infoOpen);
}

function bind() {
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.onclick = () => { state.route = el.dataset.nav; state.sheet = null; render(); };
  });
  document.querySelectorAll('[data-tap]').forEach(el => {
    el.onclick = () => { state.route = el.dataset.tap; render(); };
  });
  document.querySelectorAll('[data-route]').forEach(el => {
    el.onclick = () => { state.route = el.dataset.route; state.sheet = null; render(); };
  });
  document.querySelectorAll('[data-sheet]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      state.sheet = el.dataset.sheet;
      state.sheetData = el.dataset.sheetData;
      render();
    };
  });
  document.querySelectorAll('[data-close-sheet]').forEach(el => {
    el.onclick = () => { state.sheet = null; state.sheetData = null; render(); };
  });
  document.querySelectorAll('[data-toast]').forEach(el => {
    el.onclick = (e) => { e.stopPropagation(); showToast(el.dataset.toast); };
  });
  document.querySelectorAll('[data-flow]').forEach(el => {
    el.onclick = () => {
      const fid = el.dataset.flow;
      const f = flows.find(x => x.id === fid);
      if (f && f.agent === 'echo') {
        state.route = 'echo';
        state.echoView = 'calendar';
        render();
      } else {
        state.sheet = 'flow';
        state.sheetData = fid;
        render();
      }
    };
  });
  document.querySelectorAll('[data-hire]').forEach(el => {
    el.onclick = () => {
      const id = el.dataset.hire;
      if (state.hired.has(id)) state.hired.delete(id);
      else state.hired.add(id);
      render();
    };
  });
  document.querySelectorAll('[data-assign]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const id = el.dataset.assign;
      if (state.assignedAgents.has(id)) state.assignedAgents.delete(id);
      else state.assignedAgents.add(id);
      render();
    };
  });
  document.querySelectorAll('[data-brief-pick]').forEach(el => {
    el.onclick = () => { state.briefInput = el.dataset.briefPick; render(); };
  });
  document.querySelectorAll('[data-channel]').forEach(el => {
    el.onclick = () => { state.channel = el.dataset.channel; render(); };
  });
  document.querySelectorAll('[data-agent-pick]').forEach(el => {
    el.onclick = () => { state.selectedAgent = el.dataset.agentPick; render(); };
  });
  document.querySelectorAll('[data-echo-view]').forEach(el => {
    el.onclick = () => { state.echoView = el.dataset.echoView; render(); };
  });
  document.querySelectorAll('[data-example]').forEach(el => {
    el.onclick = () => {
      const ex = {
        '1': 'i sell handmade ceramics in toronto',
        '2': 'i run a hot yoga studio in austin',
        '3': 'i have a family dental practice in brooklyn'
      };
      state.brief = ex[el.dataset.example];
      render();
    };
  });
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      state.toggles[el.dataset.toggle] = !state.toggles[el.dataset.toggle];
      render();
    };
  });
  document.querySelectorAll('[data-action]').forEach(el => {
    el.onclick = () => {
      const a = el.dataset.action;
      if (a === 'analyze') { state.route = 'hire'; state.sheet = null; render(); }
      else if (a === 'start-work') { state.route = 'deck'; state.sheet = null; render(); }
      else if (a === 'onboard-next') {
        state.onboardStep = (state.onboardStep || 1) + 1;
        state.carrierHelpOpen = false;
        render();
      }
      else if (a === 'run-analysis') {
        state.analysisRun = true;
        render();
      }
      else if (a === 'enter-card') {
        state.cardEntered = true;
        showToast('card saved · no charge yet');
        setTimeout(() => {
          state.onboardStep = 5;
          state.phoneProvisioned = true;
          render();
        }, 900);
      }
      else if (a === 'show-carrier-help') {
        state.carrierHelpOpen = true;
        render();
      }
      else if (a === 'hide-carrier-help') {
        state.carrierHelpOpen = false;
        state.selectedCarrier = null;
        render();
      }
      else if (a === 'connect-ig') {
        state.igConnected = true;
        showToast('instagram connected · @ceramicsco');
        render();
      }
      else if (a === 'onboard-done') {
        state.route = 'deck';
        state.onboardStep = 1;
        showToast("i'm starting to work on your marketing now");
        render();
      }
      else if (a === 'upload-photos') {
        showToast('photo picker would open · post will go out wed 11a');
        setTimeout(() => { state.route = 'deck'; render(); }, 1500);
      }
      else if (a === 'skip-post') {
        showToast("post skipped · i'll try again next week");
        setTimeout(() => { state.route = 'deck'; render(); }, 1500);
      }
      else if (a === 'start-billing') {
        const prices = { starter: 39, team: 99, studio: 299 };
        const p = state.selectedPlan || 'team';
        state.homeState = 'steady';
        showToast('thanks · billing started · $' + prices[p] + ' / month');
        render();
      }
      else if (a === 'delay-billing') {
        showToast("ok · i'll ask again tomorrow");
      }
      else if (a === 'send-brief') {
        state.sheet = 'thinking';
        render();
        setTimeout(() => {
          state.sheet = null;
          state.briefInput = '';
          showToast('brief sent · team on it');
          render();
        }, 2800);
      }
      else if (a === 'approve-flow') { state.sheet = null; showToast('approved'); render(); }
      else if (a === 'approve-post') { state.echoView = 'calendar'; showToast('post approved · scheduled for tue 11a'); render(); }
      else if (a === 'save-rule') { state.sheet = null; showToast('rule saved · signal updated'); render(); }
      else if (a === 'save-settings') { state.sheet = null; showToast('saved'); render(); }
      else if (a === 'signout') { state.sheet = null; state.route = 'splash'; showToast('signed out'); render(); }
    };
  });

  document.querySelectorAll('[data-goal]').forEach(el => {
    el.onclick = () => {
      state.selectedGoal = el.dataset.goal;
      render();
    };
  });

  document.querySelectorAll('[data-carrier]').forEach(el => {
    el.onclick = () => {
      state.selectedCarrier = el.dataset.carrier;
      render();
    };
  });

  document.querySelectorAll('[data-home-state]').forEach(el => {
    el.onclick = () => {
      state.homeState = el.dataset.homeState;
      render();
    };
  });

  document.querySelectorAll('[data-plan]').forEach(el => {
    el.onclick = () => {
      state.selectedPlan = el.dataset.plan;
      render();
    };
  });

  document.querySelectorAll('[data-change-plan]').forEach(el => {
    el.onclick = () => {
      const newPlan = el.dataset.changePlan;
      if (newPlan === state.selectedPlan) {
        showToast('already on this plan');
      } else {
        state.selectedPlan = newPlan;
        state.sheet = null;
        showToast('plan changed · ' + newPlan);
      }
      render();
    };
  });

  const ta = document.getElementById('brief-ta');
  if (ta) ta.oninput = e => {
    state.brief = e.target.value;
    const btn = document.querySelector('[data-action=onboard-next]');
    if (btn && state.onboardStep === 1) {
      btn.disabled = state.brief.length <= 10;
      btn.textContent = state.brief.length > 10 ? 'continue →' : 'write something to continue';
    }
  };

  const bi = document.getElementById('brief-input');
  if (bi) bi.oninput = e => { state.briefInput = e.target.value; };
}

render();
</script>
</body>
</html>
