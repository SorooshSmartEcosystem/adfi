<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ADFI · Dashboard (redesign)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
    background: #FAFAF7;
    color: #111;
    font-weight: 400;
    line-height: 1.5;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  a { color: inherit; text-decoration: none; }
  .mono { font-family: "SF Mono", "JetBrains Mono", "Courier New", monospace; }

  :root {
    --bg: #FAFAF7;
    --ink: #111;
    --ink2: #444;
    --ink3: #666;
    --ink4: #888;
    --ink5: #999;
    --surface: #F2EFE5;
    --surface2: #F8F5EA;
    --border: #E5E3DB;
    --border2: #EEEBE0;
    --alive: #7CE896;
    --alive-dark: #3a9d5c;
    --attn-bg: #FFF9ED;
    --attn-border: #F0D98C;
    --attn-text: #8a6a1e;
    --urgent: #C84A3E;
    --sidebar-w: 240px;
    --topbar-h: 56px;
  }

  @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.85)} }
  @keyframes fade-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes draw-line { from { stroke-dashoffset: 600; } to { stroke-dashoffset: 0; } }
  @keyframes grow-bar { from { transform: scaleY(0); } to { transform: scaleY(1); } }

  .app-layout { min-height: 100vh; display: flex; animation: fade-in 0.3s ease; }
  .sidebar {
    width: var(--sidebar-w); background: var(--bg);
    border-right: 0.5px solid var(--border);
    display: flex; flex-direction: column; padding: 16px;
    position: fixed; inset: 0 auto 0 0;
    overflow-y: auto; z-index: 50;
    transition: transform 0.25s ease;
  }
  .sidebar-header { display: flex; align-items: center; gap: 10px; padding: 4px 8px 16px; border-bottom: 0.5px solid var(--border2); margin-bottom: 12px; }
  .sidebar-biz-icon { width: 28px; height: 28px; border-radius: 8px; background: #111; color: white; display: flex; align-items: center; justify-content: center; font-family: "SF Mono", monospace; font-size: 11px; font-weight: 500; }
  .sidebar-biz-name { font-size: 13px; font-weight: 500; }
  .sidebar-biz-status { display: flex; align-items: center; gap: 5px; font-family: "SF Mono", monospace; font-size: 10px; color: var(--alive-dark); }
  .sidebar-biz-status::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--alive); animation: pulse-dot 2s ease-in-out infinite; }
  .sidebar-section { padding: 12px 0 8px; }
  .sidebar-section-label { font-family: "SF Mono", monospace; font-size: 9px; color: var(--ink5); letter-spacing: 0.2em; padding: 0 8px 8px; text-transform: uppercase; }
  .sidebar-link { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; font-size: 13px; color: var(--ink2); cursor: pointer; width: 100%; text-align: left; transition: background 0.12s, color 0.12s; }
  .sidebar-link:hover { background: var(--surface); }
  .sidebar-link.active { background: var(--ink); color: white; }
  .sidebar-link-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5; }
  .sidebar-link.active .sidebar-link-dot { opacity: 0.7; }
  .sidebar-link-badge { margin-left: auto; font-family: "SF Mono", monospace; font-size: 10px; background: var(--attn-bg); color: var(--attn-text); padding: 1px 6px; border-radius: 100px; }
  .sidebar-link.active .sidebar-link-badge { background: rgba(255,255,255,0.12); color: white; }
  .sidebar-footer { margin-top: auto; padding-top: 12px; border-top: 0.5px solid var(--border2); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background 0.12s; }
  .sidebar-user:hover { background: var(--surface); }
  .sidebar-user-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--surface); color: var(--ink); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; }
  .sidebar-user-name { font-size: 12px; font-weight: 500; }
  .sidebar-user-plan { font-family: "SF Mono", monospace; font-size: 10px; color: var(--ink4); }

  .app-main { flex: 1; margin-left: var(--sidebar-w); display: flex; flex-direction: column; min-height: 100vh; min-width: 0; }
  .app-topbar { height: var(--topbar-h); border-bottom: 0.5px solid var(--border); background: rgba(250, 250, 247, 0.92); backdrop-filter: saturate(180%) blur(14px); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 40; }
  .topbar-title { font-size: 15px; font-weight: 500; }
  .topbar-sub { font-family: "SF Mono", monospace; font-size: 11px; color: var(--ink4); }
  .topbar-btn { padding: 7px 12px; border-radius: 100px; font-size: 12px; font-weight: 500; background: transparent; color: var(--ink2); border: 0.5px solid var(--border); transition: all 0.15s; }
  .topbar-btn:hover { border-color: var(--ink); color: var(--ink); }

  .mobile-menu-btn { display: none; width: 32px; height: 32px; }
  .mobile-menu-btn div { width: 18px; height: 1.5px; background: var(--ink); margin: 4px auto; }

  .app-content { flex: 1; padding: 28px 24px 80px; max-width: 1280px; width: 100%; margin: 0 auto; }

  @media (max-width: 900px) {
    .sidebar { transform: translateX(-100%); box-shadow: 8px 0 40px rgba(0,0,0,0.08); }
    .sidebar.open { transform: translateX(0); }
    .app-main { margin-left: 0; }
    .mobile-menu-btn { display: block; }
    .sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 49; }
    .sidebar-backdrop.open { display: block; }
  }

  .dash-greeting { margin-bottom: 28px; }
  .dash-greeting-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .live-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border: 0.5px solid var(--border); background: white; border-radius: 100px; font-family: "SF Mono", monospace; font-size: 10px; color: var(--alive-dark); letter-spacing: 0.15em; }
  .live-pill-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--alive); animation: pulse-dot 2s ease-in-out infinite; }
  .dash-meta-text { font-family: "SF Mono", monospace; font-size: 11px; color: var(--ink4); letter-spacing: 0.05em; }
  .dash-greeting h1 { font-size: clamp(26px, 3.5vw, 36px); font-weight: 500; letter-spacing: -0.025em; line-height: 1.1; margin-bottom: 8px; }
  .dash-greeting p { font-size: 16px; color: var(--ink3); }

  .amber-card { background: var(--attn-bg); border: 0.5px solid var(--attn-border); border-radius: 18px; padding: 18px 20px; cursor: pointer; transition: transform 0.15s; margin-bottom: 28px; display: flex; align-items: center; gap: 16px; }
  .amber-card:hover { transform: translateY(-1px); }
  .amber-card-icon { width: 40px; height: 40px; background: white; border: 0.5px solid var(--attn-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .amber-card-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--attn-border); }
  .amber-card-body { flex: 1; min-width: 0; }
  .amber-card-label { font-family: "SF Mono", monospace; font-size: 10px; color: var(--attn-text); letter-spacing: 0.2em; margin-bottom: 4px; }
  .amber-card-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; line-height: 1.4; }
  .amber-card-sub { font-size: 13px; color: var(--ink3); }
  .amber-card-arrow { font-family: "SF Mono", monospace; font-size: 14px; color: var(--attn-text); flex-shrink: 0; }

  .kpi-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 28px; }
  @media (min-width: 640px) { .kpi-grid { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1100px) { .kpi-grid { grid-template-columns: 1fr 1fr 1fr 1fr; } }
  .kpi-card { background: white; border: 0.5px solid var(--border); border-radius: 16px; padding: 18px 18px 14px; position: relative; overflow: hidden; transition: border-color 0.15s; }
  .kpi-card:hover { border-color: var(--ink5); }
  .kpi-label { font-family: "SF Mono", monospace; font-size: 10px; color: var(--ink4); letter-spacing: 0.2em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .kpi-label-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ink); opacity: 0.5; }
  .kpi-value { font-size: 30px; font-weight: 500; letter-spacing: -0.025em; line-height: 1; margin-bottom: 8px; }
  .kpi-trend { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .kpi-delta { font-family: "SF Mono", monospace; font-size: 11px; display: inline-flex; align-items: center; gap: 4px; }
  .kpi-delta.up { color: var(--alive-dark); }
  .kpi-delta.down { color: var(--urgent); }
  .kpi-delta.flat { color: var(--ink4); }
  .kpi-spark { flex: 1; max-width: 80px; height: 28px; }
  .kpi-context { font-size: 12px; color: var(--ink3); line-height: 1.45; margin-top: 10px; border-top: 0.5px dashed var(--border2); padding-top: 10px; }

  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-head-left { display: flex; align-items: center; gap: 10px; }
  .section-title { font-size: 18px; font-weight: 500; letter-spacing: -0.015em; }
  .section-meta { font-family: "SF Mono", monospace; font-size: 10px; color: var(--ink4); letter-spacing: 0.15em; }
  .section-link { font-family: "SF Mono", monospace; font-size: 11px; color: var(--ink3); transition: color 0.15s; }
  .section-link:hover { color: var(--ink); }

  .reach-chart-card { background: white; border: 0.5px solid var(--border); border-radius: 18px; padding: 22px; margin-bottom: 28px; }
  .reach-chart-head { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
  .reach-summary-num { font-size: 36px; font-weight: 500; letter-spacing: -0.025em; line-height: 1; margin-bottom: 6px; }
  .reach-summary-sub { font-size: 13px; color: var(--ink3); }
  .chart-toggle { display: flex; align-items: center; background: var(--surface); border-radius: 100px; padding: 3px; gap: 2px; }
  .chart-toggle button { padding: 5px 10px; border-radius: 100px; font-family: "SF Mono", monospace; font-size: 10px; color: var(--ink4); letter-spacing: 0.1em; transition: all 0.15s; }
  .chart-toggle button.active { background: white; color: var(--ink); box-shadow: 0 0 0 0.5px var(--border); }
  .reach-chart-svg { width: 100%; height: 180px; display: block; }
  .chart-line { stroke: var(--ink); stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 600; animation: draw-line 1.2s ease-out forwards; }
  .chart-area { fill: var(--ink); opacity: 0.04; }
  .chart-grid-line { stroke: var(--border2); stroke-width: 0.5; stroke-dasharray: 2 4; }
  .chart-axis-label { font-family: "SF Mono", monospace; font-size: 9px; fill: var(--ink5); letter-spacing: 0.15em; }
  .chart-dot { fill: var(--ink); stroke: white; stroke-width: 2; }
  .chart-dot-active { fill: var(--alive); stroke: white; stroke-width: 2; }

  .channels-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 28px; }
  @media (min-width: 700px) { .channels-grid { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1100px) { .channels-grid { grid-template-columns: repeat(4, 1fr); } }
  .channel-card { background: white; border: 0.5px solid var(--border); border-radius: 14px; padding: 16px; cursor: pointer; transition: border-color 0.15s; }
  .channel-card:hover { border-color: var(--ink); }
  .channel-card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .channel-mark { width: 32px; height: 32px; border-radius: 8px; background: var(--surface); display: flex; align-items: center; justify-content: center; color: var(--ink); flex-shrink: 0; }
  .channel-meta { flex: 1; min-width: 0; }
  .channel-name { font-size: 14px; font-weight: 500; line-height: 1.2; }
  .channel-handle { font-family: "SF Mono", monospace; font-size: 10px; color: var(--ink4); letter-spacing: 0.05em; }
  .channel-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .channel-status-dot.alive { background: var(--alive); animation: pulse-dot 2s ease-in-out infinite; }
  .channel-status-dot.idle { background: var(--ink5); }
  .channel-status-dot.attn { background: var(--attn-border); }
  .channel-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 0.5px solid var(--border2); padding-top: 12px; }
  .channel-stat-num { font-size: 18px; font-weight: 500; letter-spacing: -0.015em; line-height: 1; }
  .channel-stat-label { font-family: "SF Mono", monospace; font-size: 9px; color: var(--ink4); letter-spacing: 0.15em; margin-top: 4px; }
  .channel-stat-delta { font-family: "SF Mono", monospace; font-size: 10px; margin-top: 2px; }

  .engagement-bars { display: flex; align-items: flex-end; gap: 6px; height: 80px; margin-bottom: 12px; }
  .engagement-bar-col { flex: 1; display: flex; flex-direction: column; align-items: stretch; justify-content: flex-end; gap: 2px; }
  .engagement-bar { background: var(--ink); border-radius: 2px; transform-origin: bottom; animation: grow-bar 0.6s ease-out forwards; }
  .engagement-bar.muted { background: var(--border); }
  .engagement-bar.attn { background: var(--attn-border); }
  .engagement-day { font-family: "SF Mono", monospace; font-size: 9px; color: var(--ink5); text-align: center; letter-spacing: 0.1em; margin-top: 4px; }

  .row-2col { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 28px; }
  @media (min-width: 1024px) { .row-2col { grid-template-columns: 1.4fr 1fr; } }
  .panel { background: white; border: 0.5px solid var(--border); border-radius: 16px; padding: 22px; }
  .panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .panel-title { font-size: 14px; font-weight: 500; }
  .panel-meta { font-family: "SF Mono", monospace; font-size: 10px; color: var(--ink4); letter-spacing: 0.15em; }

  .working-list { display: flex; flex-direction: column; gap: 10px; }
  .working-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid var(--border2); }
  .working-row:last-child { border-bottom: none; }
  .working-row-text { font-size: 13px; flex: 1; }
  .working-row-bar { flex: 0 0 60px; height: 4px; background: var(--surface); border-radius: 2px; overflow: hidden; margin: 0 14px; }
  .working-row-fill { height: 100%; background: var(--ink); border-radius: 2px; }
  .working-row-fill.muted { background: var(--border); }
  .working-row-pct { font-family: "SF Mono", monospace; font-size: 11px; width: 36px; text-align: right; }
  .working-row-pct.up { color: var(--alive-dark); }
  .working-row-pct.down { color: var(--ink4); }

  .activity-list { background: white; border: 0.5px solid var(--border); border-radius: 16px; padding: 0; overflow: hidden; }
  .activity-item { padding: 16px 20px; border-bottom: 0.5px solid var(--border2); display: flex; gap: 14px; transition: background 0.12s; cursor: pointer; }
  .activity-item:last-child { border-bottom: none; }
  .activity-item:hover { background: var(--surface2); }
  .activity-bullet { width: 32px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
  .activity-bullet-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--alive); margin-top: 6px; }
  .activity-bullet-line { flex: 1; width: 0.5px; background: var(--border2); margin-top: 4px; min-height: 12px; }
  .activity-content { flex: 1; min-width: 0; }
  .activity-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .activity-agent { font-family: "SF Mono", monospace; font-size: 10px; color: var(--alive-dark); letter-spacing: 0.2em; }
  .activity-time { font-family: "SF Mono", monospace; font-size: 10px; color: var(--ink4); letter-spacing: 0.1em; }
  .activity-value { margin-left: auto; font-family: "SF Mono", monospace; font-size: 11px; color: var(--ink2); }
  .activity-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .activity-desc { font-size: 13px; color: var(--ink3); line-height: 1.5; }
</style>
</head>
<body>
<!--
  Source of truth for the dashboard redesign brief.

  Components used in this prototype that are now implemented in the React app:
    - LivePill (.live-pill) → components/dashboard/live-pill.tsx
    - KpiCard (.kpi-card) → components/dashboard/kpi-card.tsx
    - ReachChart (.reach-chart-card) → components/dashboard/reach-chart.tsx
    - ChannelsGrid (.channels-grid) → components/dashboard/channels-grid.tsx
    - EngagementBars (.engagement-bars) → components/dashboard/engagement-bars.tsx
    - WhatsWorking (.working-list) → components/dashboard/whats-working.tsx
    - ActivityFeed (.activity-list) → components/dashboard/recent-activity.tsx (existing, restyled)

  Tokens this prototype uses (already on shared CSS):
    --bg #FAFAF7  --ink #111  --ink2..5 444/666/888/999
    --surface #F2EFE5  --border #E5E3DB  --border2 #EEEBE0
    --alive #7CE896 / dark #3a9d5c
    --attn-bg #FFF9ED  --attn-border #F0D98C  --attn-text #8a6a1e
    --urgent #C84A3E

  See git log for the full prototype history.
-->
</body>
</html>
