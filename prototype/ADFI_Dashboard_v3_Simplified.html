<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ADFI · Dashboard (simplified)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
    background: #FAFAF7; color: #111; font-weight: 400;
    line-height: 1.5; font-size: 14px;
    -webkit-font-smoothing: antialiased; overflow-x: hidden;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  a { color: inherit; text-decoration: none; }
  .mono { font-family: "SF Mono", "JetBrains Mono", "Courier New", monospace; }

  :root {
    --bg: #FAFAF7; --ink: #111; --ink2: #444; --ink3: #666; --ink4: #888; --ink5: #aaa;
    --surface: #F2EFE5; --surface2: #F8F5EA; --border: #E5E3DB; --border2: #EEEBE0;
    --alive: #7CE896; --alive-dark: #3a9d5c;
    --attn-bg: #FFF9ED; --attn-border: #F0D98C; --attn-text: #8a6a1e;
    --urgent: #C84A3E; --sidebar-w: 240px; --topbar-h: 56px;
  }

  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes fade-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes draw-line { from { stroke-dashoffset: 1000; } to { stroke-dashoffset: 0; } }
  @keyframes grow-bar { from { transform: scaleY(0); } to { transform: scaleY(1); } }

  .app-layout { min-height: 100vh; display: flex; animation: fade-in 0.3s ease; }
  .sidebar { width: var(--sidebar-w); background: var(--bg); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; padding: 16px; position: fixed; inset: 0 auto 0 0; overflow-y: auto; z-index: 50; transition: transform 0.25s ease; }
  .sidebar-header { display: flex; align-items: center; gap: 10px; padding: 4px 8px 18px; margin-bottom: 12px; border-bottom: 0.5px solid var(--border2); }
  .sidebar-biz-icon { width: 28px; height: 28px; border-radius: 8px; background: #111; color: white; display: flex; align-items: center; justify-content: center; font-family: "SF Mono", monospace; font-size: 11px; font-weight: 500; }
  .sidebar-biz-name { font-size: 13px; font-weight: 500; }
  .sidebar-biz-status { font-size: 11px; color: var(--ink4); margin-top: 1px; }
  .sidebar-section { padding: 10px 0 6px; }
  .sidebar-section-label { font-size: 11px; color: var(--ink4); padding: 0 8px 6px; }
  .sidebar-link { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; font-size: 13px; color: var(--ink2); cursor: pointer; width: 100%; text-align: left; transition: background 0.12s, color 0.12s; }
  .sidebar-link:hover { background: var(--surface); }
  .sidebar-link.active { background: var(--ink); color: white; }
  .sidebar-link-badge { margin-left: auto; font-family: "SF Mono", monospace; font-size: 10px; background: var(--attn-bg); color: var(--attn-text); padding: 1px 6px; border-radius: 100px; }
  .sidebar-link.active .sidebar-link-badge { background: rgba(255,255,255,0.15); color: white; }
  .sidebar-footer { margin-top: auto; padding-top: 12px; border-top: 0.5px solid var(--border2); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background 0.12s; }
  .sidebar-user:hover { background: var(--surface); }
  .sidebar-user-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--surface); color: var(--ink); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; }
  .sidebar-user-name { font-size: 12px; font-weight: 500; }
  .sidebar-user-plan { font-size: 11px; color: var(--ink4); }

  .app-main { flex: 1; margin-left: var(--sidebar-w); display: flex; flex-direction: column; min-height: 100vh; min-width: 0; }
  .app-topbar { height: var(--topbar-h); border-bottom: 0.5px solid var(--border); background: rgba(250, 250, 247, 0.92); backdrop-filter: saturate(180%) blur(14px); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 40; }
  .topbar-title { font-size: 14px; font-weight: 500; }
  .topbar-btn { padding: 7px 12px; border-radius: 100px; font-size: 12px; color: var(--ink3); border: 0.5px solid var(--border); transition: all 0.15s; }
  .topbar-btn:hover { border-color: var(--ink); color: var(--ink); }
  .mobile-menu-btn { display: none; width: 32px; height: 32px; }
  .mobile-menu-btn div { width: 18px; height: 1.5px; background: var(--ink); margin: 4px auto; }

  .app-content { flex: 1; padding: 40px 32px 80px; max-width: 1200px; width: 100%; margin: 0 auto; }
  @media (max-width: 900px) {
    .sidebar { transform: translateX(-100%); box-shadow: 8px 0 40px rgba(0,0,0,0.08); }
    .sidebar.open { transform: translateX(0); }
    .app-main { margin-left: 0; } .mobile-menu-btn { display: block; }
    .sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 49; }
    .sidebar-backdrop.open { display: block; } .app-content { padding: 28px 20px 60px; }
  }

  .greeting { margin-bottom: 40px; }
  .greeting-status { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--alive-dark); margin-bottom: 18px; }
  .greeting-status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--alive); animation: pulse-dot 2s ease-in-out infinite; }
  .greeting h1 { font-size: clamp(28px, 4vw, 40px); font-weight: 500; letter-spacing: -0.025em; line-height: 1.1; margin-bottom: 10px; }
  .greeting-sub { font-size: 16px; color: var(--ink3); line-height: 1.5; }

  .needs-you { background: var(--attn-bg); border: 0.5px solid var(--attn-border); border-radius: 16px; padding: 20px 22px; margin-bottom: 48px; cursor: pointer; display: flex; align-items: center; gap: 16px; transition: transform 0.15s; }
  .needs-you:hover { transform: translateY(-1px); }
  .needs-you-body { flex: 1; }
  .needs-you-title { font-size: 16px; font-weight: 500; line-height: 1.4; margin-bottom: 4px; }
  .needs-you-sub { font-size: 13px; color: var(--attn-text); }
  .needs-you-arrow { color: var(--attn-text); font-size: 18px; flex-shrink: 0; }

  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border: 0.5px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 48px; }
  @media (min-width: 780px) { .kpi-grid { grid-template-columns: 1fr 1fr 1fr 1fr; } }
  .kpi-cell { background: white; padding: 22px 22px 24px; }
  .kpi-label { font-size: 12px; color: var(--ink4); margin-bottom: 12px; }
  .kpi-value { font-size: 32px; font-weight: 500; letter-spacing: -0.025em; line-height: 1; margin-bottom: 8px; }
  .kpi-delta { font-size: 12px; }
  .kpi-delta.up { color: var(--alive-dark); }
  .kpi-delta.down { color: var(--ink4); }
  .kpi-delta.flat { color: var(--ink4); }

  .section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; }
  .section-title { font-size: 18px; font-weight: 500; letter-spacing: -0.015em; }
  .section-link { font-size: 13px; color: var(--ink4); transition: color 0.15s; }
  .section-link:hover { color: var(--ink); }

  .reach-card { background: white; border: 0.5px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 48px; }
  .reach-head { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 28px; }
  .reach-num { font-size: 36px; font-weight: 500; letter-spacing: -0.025em; line-height: 1; margin-bottom: 6px; }
  .reach-sub { font-size: 13px; color: var(--ink3); }
  .reach-sub .delta { color: var(--alive-dark); }
  .chart-toggle { display: flex; gap: 4px; }
  .chart-toggle button { padding: 6px 12px; border-radius: 100px; font-size: 12px; color: var(--ink4); transition: color 0.15s; }
  .chart-toggle button.active { color: var(--ink); background: var(--surface); }
  .reach-chart-svg { width: 100%; height: 160px; display: block; margin-bottom: 12px; }
  .chart-line { stroke: var(--ink); stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 1000; animation: draw-line 1.2s ease-out forwards; }
  .chart-area { fill: var(--ink); opacity: 0.04; }
  .chart-dot-active { fill: var(--alive); stroke: white; stroke-width: 2; }
  .chart-axis { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink4); }

  .channels-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 48px; }
  @media (min-width: 900px) { .channels-grid { grid-template-columns: repeat(4, 1fr); } }
  .channel-card { background: white; border: 0.5px solid var(--border); border-radius: 14px; padding: 18px; cursor: pointer; transition: border-color 0.15s; position: relative; }
  .channel-card:hover { border-color: var(--ink); }
  .channel-head { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .channel-mark { width: 28px; height: 28px; border-radius: 7px; background: var(--surface); display: flex; align-items: center; justify-content: center; color: var(--ink); flex-shrink: 0; }
  .channel-name { font-size: 13px; font-weight: 500; flex: 1; }
  .channel-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .channel-status-dot.alive { background: var(--alive); }
  .channel-status-dot.idle { background: var(--ink5); }
  .channel-num { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; line-height: 1; margin-bottom: 6px; }
  .channel-meta { font-size: 12px; color: var(--ink4); }
  .channel-meta .delta { color: var(--alive-dark); }

  .engagement-card { background: white; border: 0.5px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 48px; }
  .engagement-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 28px; }
  .engagement-bars { display: flex; align-items: flex-end; gap: 8px; height: 100px; }
  .engagement-bar-col { flex: 1; display: flex; flex-direction: column; align-items: stretch; justify-content: flex-end; gap: 6px; }
  .engagement-bar { background: var(--ink); border-radius: 3px; transform-origin: bottom; animation: grow-bar 0.6s ease-out forwards; min-height: 4px; }
  .engagement-bar.muted { background: var(--border); }
  .engagement-day { font-size: 10px; color: var(--ink5); text-align: center; }
  .engagement-day.today { color: var(--ink); font-weight: 500; }

  .working-list { background: white; border: 0.5px solid var(--border); border-radius: 16px; padding: 12px 0; margin-bottom: 48px; }
  .working-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 22px; border-bottom: 0.5px solid var(--border2); }
  .working-row:last-child { border-bottom: none; }
  .working-row-rank { font-size: 12px; color: var(--ink4); width: 24px; flex-shrink: 0; }
  .working-row-text { flex: 1; font-size: 14px; }
  .working-row-pct { font-size: 13px; color: var(--alive-dark); flex-shrink: 0; }

  .activity-list { background: white; border: 0.5px solid var(--border); border-radius: 16px; overflow: hidden; }
  .activity-item { padding: 18px 22px; border-bottom: 0.5px solid var(--border2); cursor: pointer; transition: background 0.12s; }
  .activity-item:last-child { border-bottom: none; }
  .activity-item:hover { background: var(--surface2); }
  .activity-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; gap: 12px; }
  .activity-title { font-size: 14px; font-weight: 500; flex: 1; }
  .activity-time { font-size: 12px; color: var(--ink4); flex-shrink: 0; }
  .activity-desc { font-size: 13px; color: var(--ink3); line-height: 1.5; }
</style>
</head>
<body>
<!--
  V3 simplified prototype — the new visual standard for ADFI.

  Key cuts vs v1:
    - sparklines per KPI (gone)
    - mono ALL-CAPS section pills (gone)
    - per-KPI dashed-divider context lines (gone)
    - chart grid lines + intermediate axis labels (gone)
    - channel cards with 4 stats each → one number + meta line
    - what's-working bars + window label → ranked list with rank + label + lift
    - activity timeline bullet+line → flat rows
    - decorative mono "EVERYTHING IS RUNNING" pill → soft inline status line
    - duplicate "REACH OVER TIME" + "Reach" labels → one (the number)

  Internal agent names (SIGNAL/ECHO/SCOUT/PULSE/STRATEGIST) never appear in
  user-facing copy — activity items read in first person ("i caught a missed
  call") not labeled by which agent fired.

  Tokens are unchanged from the locked design system in @orb/ui.
-->
</body>
</html>
