<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ADFI · Your marketing team, hired.</title>
<style>
  /* ===================================================
     ADFI WEB APP — DESIGN SYSTEM
     Fully responsive: desktop, tablet, mobile web
     =================================================== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
    background: #FAFAF7;
    color: #111;
    font-weight: 400;
    line-height: 1.5;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  a { color: inherit; text-decoration: none; }
  input, textarea, select { font-family: inherit; font-size: 14px; color: #111; }
  input:focus, textarea:focus, select:focus, button:focus { outline: none; }
  .mono { font-family: "SF Mono", "JetBrains Mono", "Courier New", monospace; }

  /* CSS variables for design tokens */
  :root {
    --bg: #FAFAF7;
    --ink: #111;
    --ink2: #444;
    --ink3: #666;
    --ink4: #888;
    --ink5: #999;
    --surface: #F2EFE5;
    --surface2: #F8F5EA;
    --border: #E5E3DB;
    --border2: #EEEBE0;
    --alive: #7CE896;
    --alive-dark: #3a9d5c;
    --attn-bg: #FFF9ED;
    --attn-border: #F0D98C;
    --attn-text: #8a6a1e;
    --urgent: #C84A3E;
    --sidebar-w: 240px;
    --topbar-h: 56px;
  }

  /* ===================================================
     ANIMATIONS
     =================================================== */
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-5px) scale(1.02); }
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }
  @keyframes pulse-ring {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.2); opacity: 0; }
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slide-in-right {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }

  /* ===================================================
     LAYOUT — LOGGED OUT (marketing + auth)
     =================================================== */
  .page { min-height: 100vh; display: flex; flex-direction: column; animation: fade-in 0.3s ease; }

  .marketing-nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(250, 250, 247, 0.92);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    border-bottom: 0.5px solid var(--border);
  }
  .marketing-nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 1200px; margin: 0 auto;
    padding: 14px 24px;
  }
  .logo {
    display: flex; align-items: center; gap: 8px;
    font-weight: 500; font-size: 15px; letter-spacing: -0.01em;
  }
  .logo-orb {
    width: 16px; height: 16px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #333 0%, #111 60%);
    animation: breathe 3s ease-in-out infinite;
  }
  .marketing-nav-links {
    display: flex; align-items: center; gap: 20px;
  }
  .nav-link-text {
    font-size: 13px; color: var(--ink3);
    transition: color 0.15s;
  }
  .nav-link-text:hover { color: var(--ink); }
  .btn-nav-cta {
    background: var(--ink); color: white;
    padding: 8px 14px; border-radius: 100px;
    font-size: 13px; font-weight: 500;
    transition: transform 0.15s;
  }
  .btn-nav-cta:active { transform: scale(0.97); }

  /* Hero */
  .hero {
    padding: 80px 24px 60px;
    text-align: center;
    max-width: 720px;
    margin: 0 auto;
  }
  .hero-orb {
    width: 96px; height: 96px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #2a2a2a 0%, #111 60%);
    margin: 0 auto 32px;
    animation: float 4s ease-in-out infinite;
    position: relative;
  }
  .hero-orb::after {
    content: ''; position: absolute; inset: -10px;
    border-radius: 50%; border: 0.5px solid rgba(17,17,17,0.08);
    animation: pulse-ring 3s ease-in-out infinite;
  }
  .hero h1 {
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 500; letter-spacing: -0.035em; line-height: 1.05;
    margin-bottom: 16px;
  }
  .hero .sub {
    font-size: clamp(15px, 2vw, 17px);
    color: var(--ink3); max-width: 520px;
    margin: 0 auto 32px; line-height: 1.55;
  }
  .hero-ctas {
    display: flex; gap: 10px; justify-content: center;
    flex-wrap: wrap; margin-bottom: 12px;
  }
  .btn-primary {
    background: var(--ink); color: white;
    padding: 13px 24px; border-radius: 100px;
    font-size: 14px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 8px;
    transition: transform 0.15s;
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-secondary {
    background: transparent; color: var(--ink);
    padding: 13px 22px; border-radius: 100px;
    font-size: 14px; font-weight: 500;
    border: 0.5px solid var(--border);
    transition: border-color 0.15s;
  }
  .btn-secondary:hover { border-color: var(--ink); }
  .hero-note {
    font-family: "SF Mono", monospace;
    font-size: 11px; color: var(--ink5);
    letter-spacing: 0.05em;
  }

  /* Section base */
  .section {
    padding: 60px 24px;
    max-width: 1080px;
    margin: 0 auto;
  }
  .section-label {
    font-family: "SF Mono", monospace;
    font-size: 10px; color: var(--ink4);
    letter-spacing: 0.2em; text-transform: uppercase;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::before {
    content: ''; width: 6px; height: 6px;
    border-radius: 50%; background: var(--ink);
  }
  .section-title {
    font-size: clamp(26px, 4vw, 36px);
    font-weight: 500; letter-spacing: -0.025em;
    line-height: 1.15; margin-bottom: 16px;
    max-width: 640px;
  }
  .section-intro {
    font-size: 15px; color: var(--ink3);
    max-width: 560px; line-height: 1.6;
    margin-bottom: 40px;
  }

  /* What I do grid */
  .what-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1px;
    background: var(--border);
    border: 0.5px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
  }
  @media (min-width: 768px) {
    .what-grid { grid-template-columns: 1fr 1fr 1fr; }
  }
  .what-item {
    background: var(--bg);
    padding: 24px 22px;
    transition: background 0.2s;
  }
  .what-item:hover { background: white; }
  .what-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .pulsing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--alive);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  .what-label {
    font-family: "SF Mono", monospace;
    font-size: 10px; color: var(--alive-dark);
    letter-spacing: 0.2em;
  }
  .what-title {
    font-size: 17px; font-weight: 500;
    margin-bottom: 6px; letter-spacing: -0.01em;
  }
  .what-desc {
    font-size: 13px; color: var(--ink3);
    line-height: 1.55;
  }

  /* How it works */
  .how-steps {
    display: grid; grid-template-columns: 1fr; gap: 12px;
  }
  @media (min-width: 768px) {
    .how-steps { grid-template-columns: 1fr 1fr 1fr; }
  }
  .how-step {
    background: white; border: 0.5px solid var(--border);
    border-radius: 18px; padding: 22px;
  }
  .how-num {
    font-family: "SF Mono", monospace;
    font-size: 11px; color: var(--ink5);
    letter-spacing: 0.2em; margin-bottom: 10px;
  }
  .how-title {
    font-size: 17px; font-weight: 500;
    margin-bottom: 6px; letter-spacing: -0.01em;
  }
  .how-desc {
    font-size: 13px; color: var(--ink3);
    line-height: 1.55;
  }

  /* Pricing */
  .pricing-grid {
    display: grid; grid-template-columns: 1fr; gap: 12px;
  }
  @media (min-width: 768px) {
    .pricing-grid { grid-template-columns: 1fr 1fr 1fr; align-items: start; }
  }
  .price-card {
    background: white; border: 0.5px solid var(--border);
    border-radius: 18px; padding: 22px; position: relative;
  }
  .price-card.featured { border: 1.5px solid var(--ink); }
  @media (min-width: 768px) {
    .price-card.featured { transform: translateY(-8px); }
  }
  .price-badge {
    position: absolute; top: -9px; left: 18px;
    background: var(--ink); color: white;
    padding: 3px 10px; border-radius: 100px;
    font-family: "SF Mono", monospace;
    font-size: 10px; letter-spacing: 0.15em;
  }
  .price-head {
    display: flex; justify-content: space-between;
    align-items: baseline; margin-bottom: 4px;
  }
  .price-name { font-size: 16px; font-weight: 500; }
  .price-amt { font-size: 16px; }
  .price-amt .per { font-size: 11px; color: var(--ink4); }
  .price-tagline {
    font-family: "SF Mono", monospace;
    font-size: 10px; color: var(--ink4);
    letter-spacing: 0.1em; margin-bottom: 14px;
  }
  .price-list {
    list-style: none; display: flex; flex-direction: column;
    gap: 7px; margin-bottom: 16px;
  }
  .price-list li {
    font-size: 12.5px; color: var(--ink2);
    line-height: 1.5; padding-left: 12px; position: relative;
  }
  .price-list li::before {
    content: '•'; position: absolute; left: 0; color: var(--ink4);
  }
  .price-cta {
    display: block; width: 100%; text-align: center;
    padding: 11px; border-radius: 100px;
    font-size: 13px; font-weight: 500;
    background: var(--surface); color: var(--ink);
    transition: background 0.15s;
  }
  .price-cta:hover { background: #EAE6D8; }
  .price-card.featured .price-cta {
    background: var(--ink); color: white;
  }

  /* FAQ */
  .faq-list {
    background: white; border: 0.5px solid var(--border);
    border-radius: 18px; overflow: hidden;
  }
  .faq-item { border-bottom: 0.5px solid var(--border2); }
  .faq-item:last-child { border-bottom: none; }
  .faq-q {
    width: 100%; text-align: left;
    padding: 18px 22px;
    font-size: 14px; font-weight: 500;
    display: flex; justify-content: space-between;
    align-items: center; gap: 12px;
    transition: background 0.15s;
  }
  .faq-q:hover { background: #F8F6EF; }
  .faq-toggle {
    font-family: "SF Mono", monospace;
    font-size: 17px; color: var(--ink5);
    transition: transform 0.2s;
  }
  .faq-item.open .faq-toggle { transform: rotate(45deg); }
  .faq-a {
    max-height: 0; overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .faq-item.open .faq-a { max-height: 400px; }
  .faq-a-inner {
    padding: 0 22px 20px;
    font-size: 13px; color: var(--ink3);
    line-height: 1.65;
  }

  /* Footer */
  footer {
    border-top: 0.5px solid var(--border);
    padding: 28px 24px 36px;
    margin-top: 40px;
  }
  .footer-inner {
    max-width: 1080px; margin: 0 auto;
    display: flex; flex-direction: column;
    gap: 16px; align-items: center;
    text-align: center;
  }
  @media (min-width: 768px) {
    .footer-inner {
      flex-direction: row; justify-content: space-between;
      text-align: left;
    }
  }
  .footer-logo {
    font-family: "SF Mono", monospace;
    font-size: 13px; letter-spacing: 0.05em;
  }
  .footer-links {
    display: flex; gap: 22px; flex-wrap: wrap;
    justify-content: center;
  }
  .footer-links a {
    font-size: 12px; color: var(--ink4);
    transition: color 0.15s;
  }
  .footer-links a:hover { color: var(--ink); }
  .footer-copy {
    font-family: "SF Mono", monospace;
    font-size: 10px; color: var(--ink5);
    letter-spacing: 0.08em;
  }

  /* ===================================================
     AUTH / ONBOARDING screens
     =================================================== */
  .auth-page {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 24px;
    animation: fade-in 0.3s ease;
  }
  .auth-card {
    width: 100%; max-width: 420px;
    background: white; border: 0.5px solid var(--border);
    border-radius: 20px; padding: 32px 28px;
  }
  .auth-orb {
    width: 40px; height: 40px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #333 0%, #111 60%);
    margin: 0 auto 20px;
    animation: breathe 3s ease-in-out infinite;
  }
  .auth-title {
    font-size: 22px; font-weight: 500;
    letter-spacing: -0.02em; text-align: center;
    margin-bottom: 6px;
  }
  .auth-sub {
    font-size: 13px; color: var(--ink3);
    text-align: center; margin-bottom: 24px;
    line-height: 1.55;
  }
  .auth-field {
    margin-bottom: 12px;
  }
  .auth-field label {
    display: block;
    font-family: "SF Mono", monospace;
    font-size: 10px; color: var(--ink4);
    letter-spacing: 0.2em; margin-bottom: 6px;
    text-transform: uppercase;
  }
  .auth-input {
    width: 100%; padding: 12px 14px;
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: 12px; font-size: 14px;
    transition: border-color 0.15s;
  }
  .auth-input:focus { border-color: var(--ink); }
  .auth-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 20px 0;
    font-family: "SF Mono", monospace;
    font-size: 10px; color: var(--ink5);
    letter-spacing: 0.15em;
  }
  .auth-divider::before, .auth-divider::after {
    content: ''; flex: 1; height: 0.5px; background: var(--border);
  }
  .auth-btn {
    width: 100%; padding: 13px;
    background: var(--ink); color: white;
    border-radius: 100px;
    font-size: 14px; font-weight: 500;
    transition: transform 0.15s;
  }
  .auth-btn:active { transform: scale(0.98); }
  .auth-btn.secondary {
    background: transparent; color: var(--ink);
    border: 0.5px solid var(--border);
  }
  .auth-btn.secondary:hover { border-color: var(--ink); }
  .auth-footer {
    margin-top: 18px; text-align: center;
    font-size: 12px; color: var(--ink4);
  }
  .auth-footer a { color: var(--ink); text-decoration: underline; }

  /* Progress bar for onboarding */
  .onb-progress {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 24px;
  }
  .onb-progress-text {
    font-family: "SF Mono", monospace;
    font-size: 10px; color: var(--ink4);
    letter-spacing: 0.15em;
  }
  .onb-progress-dots {
    display: flex; gap: 4px;
  }
  .onb-dot {
    width: 14px; height: 3px;
    background: var(--border); border-radius: 2px;
  }
  .onb-dot.active { background: var(--ink); }

  /* ===================================================
     LOGGED-IN APP LAYOUT
     =================================================== */
  .app-layout {
    min-height: 100vh;
    display: flex;
    animation: fade-in 0.3s ease;
  }
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg);
    border-right: 0.5px solid var(--border);
    display: flex; flex-direction: column;
    padding: 16px;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    overflow-y: auto;
    z-index: 50;
    transition: transform 0.25s ease;
  }
  .sidebar-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 8px 16px;
    border-bottom: 0.5px solid var(--border2);
    margin-bottom: 12px;
  }
  .sidebar-biz {
    display: flex; align-items: center; gap: 10px;
    flex: 1; min-width: 0;
  }
  .sidebar-biz-icon {
    width: 28px; height: 28px; border-radius: 8px;
    background: #111; color: white;
    display: flex; align-items: center; justify-content: center;
    font-family: "SF Mono", monospace;
    font-size: 11px; font-weight: 500;
    flex-shrink: 0;
  }
  .sidebar-biz-meta {
    display: flex; flex-direction: column;
    min-width: 0;
  }
  .sidebar-biz-name {
    font-size: 13px; font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .sidebar-biz-status {
    display: flex; align-items: center; gap: 5px;
    font-family: "SF Mono", monospace;
    font-size: 10px; color: var(--alive-dark);
  }
  .sidebar-biz-status::before {
    content: ''; width: 5px; height: 5px;
    border-radius: 50%; background: var(--alive);
  }

  .sidebar-section {
    padding: 12px 0 8px;
  }
  .sidebar-section-label {
    font-family: "SF Mono", monospace;
    font-size: 9px; color: var(--ink5);
    letter-spacing: 0.2em;
    padding: 0 8px 8px;
    text-transform: uppercase;
  }
  .sidebar-link {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 8px;
    font-size: 13px; color: var(--ink2);
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    border: none; width: 100%; text-align: left;
    background: transparent;
  }
  .sidebar-link:hover { background: var(--surface); }
  .sidebar-link.active {
    background: var(--ink); color: white;
  }
  .sidebar-link-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor; opacity: 0.5;
    flex-shrink: 0;
  }
  .sidebar-link.active .sidebar-link-dot { opacity: 0.7; }
  .sidebar-link-badge {
    margin-left: auto;
    font-family: "SF Mono", monospace;
    font-size: 10px;
    background: var(--attn-bg); color: var(--attn-text);
    padding: 1px 6px; border-radius: 100px;
  }
  .sidebar-link.active .sidebar-link-badge {
    background: rgba(255,255,255,0.12); color: white;
  }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 12px;
    border-top: 0.5px solid var(--border2);
  }
  .sidebar-user {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .sidebar-user:hover { background: var(--surface); }
  .sidebar-user-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--surface); color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500;
    flex-shrink: 0;
  }
  .sidebar-user-meta {
    display: flex; flex-direction: column;
    min-width: 0;
  }
  .sidebar-user-name {
    font-size: 12px; font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .sidebar-user-plan {
    font-family: "SF Mono", monospace;
    font-size: 10px; color: var(--ink4);
  }

  /* Main content area */
  .app-main {
    flex: 1;
    margin-left: var(--sidebar-w);
    min-width: 0;
    display: flex; flex-direction: column;
    min-height: 100vh;
  }
  .app-topbar {
    height: var(--topbar-h);
    border-bottom: 0.5px solid var(--border);
    background: rgba(250, 250, 247, 0.92);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    position: sticky; top: 0; z-index: 40;
  }
  .app-topbar-left {
    display: flex; align-items: center; gap: 12px;
    flex: 1; min-width: 0;
  }
  .app-topbar-title {
    font-size: 15px; font-weight: 500;
  }
  .app-topbar-sub {
    font-family: "SF Mono", monospace;
    font-size: 11px; color: var(--ink4);
  }
  .app-topbar-right {
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .topbar-btn {
    padding: 7px 12px; border-radius: 100px;
    font-size: 12px; font-weight: 500;
    background: transparent; color: var(--ink2);
    border: 0.5px solid var(--border);
    transition: border-color 0.15s, color 0.15s;
  }
  .topbar-btn:hover {
    border-color: var(--ink); color: var(--ink);
  }
  .topbar-btn.primary {
    background: var(--ink); color: white; border-color: var(--ink);
  }

  .mobile-menu-btn {
    display: none;
    width: 32px; height: 32px;
    background: transparent; border: none;
    padding: 0;
  }
  .mobile-menu-btn div {
    width: 18px; height: 1.5px; background: var(--ink);
    margin: 4px auto; transition: transform 0.2s;
  }

  .app-content {
    flex: 1;
    padding: 28px 24px 80px;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
  }

  /* Mobile responsive for app */
  @media (max-width: 900px) {
    .sidebar {
      transform: translateX(-100%);
      box-shadow: 8px 0 40px rgba(0,0,0,0.08);
    }
    .sidebar.open { transform: translateX(0); }
    .app-main { margin-left: 0; }
    .mobile-menu-btn { display: block; }
    .sidebar-backdrop {
      display: none;
      position: fixed; inset: 0;

<!-- Demo switcher (prototype only) -->
<div class="demo-switcher" id="demo-switcher">

<!-- Toast -->

/* ===================================================
   ADFI WEB APP — APPLICATION STATE + ROUTING
   =================================================== */

const state = {
  screen: 'marketing-home',     // current screen identifier
  onbStep: 1,                   // onboarding step 1-6
  selectedPlan: 'team',
  selectedGoal: null,
  analysisRun: false,
  cardEntered: false,
  igConnected: false,
  appRoute: 'dashboard',        // dashboard | inbox | content | specialist | settings | report
  selectedAgent: 'signal',
  selectedThread: null,
  sidebarOpen: false,
  navBadges: { inbox: 3, content: 1 },
  sheet: null,                  // any modal sheet
  faqOpen: null,
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

function render() {
  const root = document.getElementById('root');
  const screen = state.screen;

  if (screen === 'marketing-home') {
    root.innerHTML = renderMarketing();
    attachMarketingHandlers();
  } else if (screen === 'auth-login' || screen === 'auth-signup') {
    root.innerHTML = renderAuth();
    attachAuthHandlers();
  } else if (screen === 'onboarding') {
    root.innerHTML = renderOnboarding();
    attachOnboardingHandlers();
  } else if (screen === 'app') {
    root.innerHTML = renderApp();
    attachAppHandlers();
  }

  // Update demo switcher active state
  document.querySelectorAll('.demo-switcher button').forEach(btn => {
    const target = btn.dataset.state;
    const isActive =
      (target === 'marketing' && screen === 'marketing-home') ||
      (target === 'auth' && (screen === 'auth-login' || screen === 'auth-signup')) ||
      (target === 'onboarding' && screen === 'onboarding') ||
      (target === 'app' && screen === 'app');
    btn.classList.toggle('active', isActive);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastT);
  window._toastT = setTimeout(() => t.classList.remove('show'), 2400);
}

// Demo switcher handlers
document.getElementById('demo-switcher').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const target = btn.dataset.state;
  if (target === 'marketing') setState({ screen: 'marketing-home' });
  else if (target === 'auth') setState({ screen: 'auth-signup' });
  else if (target === 'onboarding') setState({ screen: 'onboarding', onbStep: 1 });

});

/* ===================================================

function attachOnboardingHandlers() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.onclick = (e) => {
      e.preventDefault();
      const a = el.dataset.action;
      if (a === 'onb-next') setState({ onbStep: (state.onbStep || 1) + 1 });
      else if (a === 'run-analysis') setState({ analysisRun: true });
      else if (a === 'enter-card') {
        showToast('card saved · no charge yet');
        setTimeout(() => setState({ onbStep: 5 }), 900);
      }
      else if (a === 'connect-ig') {
        setState({ igConnected: true });
        showToast('instagram connected');
      }
      else if (a === 'onb-done') {
        showToast("i'm starting to work on your business now");
        setTimeout(() => setState({ screen: 'app', appRoute: 'dashboard', onbStep: 1, analysisRun: false }), 900);
      }
    };
  });
  document.querySelectorAll('[data-goal]').forEach(el => {
    el.onclick = () => setState({ selectedGoal: el.dataset.goal });
  });
  document.querySelectorAll('[data-plan]').forEach(el => {
    el.onclick = () => setState({ selectedPlan: el.dataset.plan });
  });
  document.querySelectorAll('[data-example]').forEach(el => {
    el.onclick = () => {
      const ta = document.getElementById('biz-desc');
      if (ta) ta.value = el.dataset.example;
    };
  });
}

function attachAppHandlers() {
  document.querySelectorAll('[data-app-route]').forEach(el => {
    el.onclick = () => {
      const route = el.dataset.appRoute;
      setState({ appRoute: route, sidebarOpen: false, selectedThread: null });
    };
  });
  document.querySelectorAll('[data-action]').forEach(el => {
    el.onclick = (e) => {
      e.preventDefault();
      const a = el.dataset.action;
      if (a === 'toggle-sidebar') setState({ sidebarOpen: !state.sidebarOpen });
      else if (a === 'log-out') {
        showToast('logged out');
        setTimeout(() => setState({ screen: 'marketing-home' }), 700);
      }
    };
  });
  document.querySelectorAll('[data-thread]').forEach(el => {
    el.onclick = () => setState({ selectedThread: Number(el.dataset.thread) });
  });
}
